<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Elivon Technology</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Montserrat', sans-serif;
    background:#1a0b10;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.section{
    margin-bottom:50px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.1);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#3a0b19;
    color:white;
    cursor:pointer;
}

input{
    padding:10px;
    margin:5px;
    width:220px;
    border-radius:6px;
    border:none;
}

/* LOGIN SCREEN */
#loginScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#1a0b10;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen">
    <h2>Admin Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error" style="color:red;"></p>
</div>

<!-- 🔓 DASHBOARD -->
<div id="dashboard" style="display:none;">

<h1>Admin Dashboard</h1>

<button onclick="loadData()">Refresh Data</button>

<!-- ORDERS -->
<div class="section">
<h2>Project Orders</h2>
<div id="orders" class="grid"></div>
</div>

<!-- APPOINTMENTS -->
<div class="section">
<h2>Appointments</h2>
<div id="appointments" class="grid"></div>
</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jyzuviakszltxerxuyea.supabase.co";

const supabaseKey = "YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* 🔐 REAL SUPABASE LOGIN */
async function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });

    if(error){
        document.getElementById("error").innerText = error.message;
        return;
    }

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadData();
}

/* 🔁 AUTO SESSION CHECK */
window.addEventListener("load", async () => {

    const { data } = await supabase.auth.getUser();

    if(data.user){
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadData();
    }
});

/* 📊 LOAD DATA */
async function loadData(){

    let { data: orders } = await supabase
        .from("orders")
        .select("*")
        .order("id", {ascending:false});

    document.getElementById("orders").innerHTML =
    (orders || []).map(o => `
        <div class="card">
            <h3>${o.name}</h3>
            <p><b>Service:</b> ${o.service}</p>
            <p><b>Package:</b> ${o.package}</p>
            <p><b>Email:</b> ${o.email}</p>
            <p><b>Phone:</b> ${o.phone}</p>
            <p><b>Company:</b> ${o.company}</p>
            <p><b>Message:</b> ${o.message}</p>
        </div>
    `).join("");

    let { data: appointments } = await supabase
        .from("appointments")
        .select("*")
        .order("id", {ascending:false});

    document.getElementById("appointments").innerHTML =
    (appointments || []).map(a => `
        <div class="card">
            <h3>${a.name}</h3>
            <p><b>Company:</b> ${a.company}</p>
            <p><b>Email:</b> ${a.email}</p>
            <p><b>Phone:</b> ${a.phone}</p>
            <p><b>Meeting Type:</b> ${a.meeting_type}</p>
            <p><b>Date:</b> ${a.meeting_date}</p>
            <p><b>Time:</b> ${a.meeting_time}</p>
            <p><b>Details:</b> ${a.details}</p>
        </div>
    `).join("");
}
</script>

</body>
</html>
