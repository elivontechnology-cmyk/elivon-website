<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Elivon Technology</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Montserrat',sans-serif;
    background:#1a0b10;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.section{
    margin-bottom:40px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.1);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#3a0b19;
    color:white;
    cursor:pointer;
    margin:5px;
}

input{
    padding:10px;
    margin:5px;
    width:220px;
    border-radius:6px;
    border:none;
}

#loginScreen{
    position:fixed;
    inset:0;
    background:#1a0b10;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <h2>Admin Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <h1>Admin Dashboard</h1>

    <button onclick="loadData()">Refresh Data</button>
    <button onclick="logout()">Logout</button>

    <div class="section">
        <h2>Project Orders</h2>
        <div id="orders" class="grid"></div>
    </div>

    <div class="section">
        <h2>Appointments</h2>
        <div id="appointments" class="grid"></div>
    </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jyzuviakszltxerxuyea.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5zuviakszltxerxuyeaIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODEyMTgsImV4cCI6MjA5NDc1NzIxOH0.Vj5tiASTMyrjAwfZQCUWy8_n3AIlDslC4L1rNd5GJ3k";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* LOGIN */
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        document.getElementById("error").innerText = error.message;
        return;
    }

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadData();
}

/* LOGOUT */
async function logout(){
    await supabase.auth.signOut();
    location.reload();
}

/* SESSION CHECK */
window.onload = async function(){
    const { data:{user} } = await supabase.auth.getUser();

    if(user){
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadData();
    }
};

/* LOAD DATA */
async function loadData(){

    const { data:orders } = await supabase
        .from("orders")
        .select("*")
        .order("id",{ascending:false});

    document.getElementById("orders").innerHTML =
    (orders || []).map(o => `
        <div class="card">
            <h3>${o.name || ""}</h3>
            <p>${o.email || ""}</p>
            <p>${o.message || ""}</p>
        </div>
    `).join("");

    const { data:appointments } = await supabase
        .from("appointments")
        .select("*")
        .order("id",{ascending:false});

    document.getElementById("appointments").innerHTML =
    (appointments || []).map(a => `
        <div class="card">
            <h3>${a.name || ""}</h3>
            <p>${a.email || ""}</p>
            <p>${a.details || ""}</p>
        </div>
    `).join("");
}
</script>

</body>
</html>
