<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Elivon Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#12070b;
    color:white;
    overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#1d0c12;
    border-right:1px solid rgba(255,255,255,0.06);
    padding:30px 20px;
}

.logo{
    font-size:24px;
    font-weight:700;
    margin-bottom:50px;
}

.logo span{
    color:#ff2f67;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.menu button{
    background:transparent;
    border:none;
    color:#d8d8d8;
    padding:14px 16px;
    border-radius:12px;
    text-align:left;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.menu button:hover{
    background:#31111d;
    color:white;
}

.menu button.active{
    background:#ff2f67;
    color:white;
}

/* MAIN */

.main{
    margin-left:260px;
    padding:35px;
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

.topbar h1{
    font-size:30px;
}

.logout-btn{
    background:#ff2f67;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:600;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    margin-bottom:35px;
}

.stat-card{
    background:#1d0c12;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:18px;
    padding:25px;
}

.stat-card p{
    color:#bdbdbd;
}

.stat-card h2{
    font-size:42px;
    margin-top:10px;
}

/* SECTIONS */

.section{
    margin-top:35px;
}

.section-title{
    margin-bottom:20px;
    font-size:24px;
}

/* TABLE */

.table-wrapper{
    overflow-x:auto;
    background:#1d0c12;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.06);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2a1019;
    padding:18px;
    text-align:left;
    color:#ff9db8;
    font-size:14px;
}

td{
    padding:18px;
    border-top:1px solid rgba(255,255,255,0.05);
    font-size:14px;
}

tr:hover{
    background:rgba(255,255,255,0.03);
}

.reply-btn{
    background:#ff2f67;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    text-decoration:none;
    display:inline-block;
    font-size:13px;
}

.empty{
    padding:30px;
    text-align:center;
    color:#9d9d9d;
}

/* LOGIN */

#loginScreen{
    position:fixed;
    inset:0;
    background:#12070b;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.login-box{
    width:400px;
    background:#1d0c12;
    padding:40px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#2a1019;
    color:white;
    font-family:'Montserrat',sans-serif;
}

.login-box button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#ff2f67;
    color:white;
    font-weight:600;
    cursor:pointer;
}

#error{
    margin-top:15px;
    text-align:center;
    color:#ff6b81;
}

.loading{
    opacity:0.7;
    pointer-events:none;
}

@media(max-width:900px){

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

    <div class="login-box">

        <h2>Elivon Admin Login</h2>

        <input 
        type="email"
        id="email"
        placeholder="Admin Email"
        autocomplete="email">

        <input 
        type="password"
        id="password"
        placeholder="Password"
        autocomplete="current-password">

        <button id="loginBtn" onclick="login()">
            Login
        </button>

        <p id="error"></p>

    </div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none;">

    <div class="sidebar">

        <div class="logo">
            Elivon<span>.</span>
        </div>

        <div class="menu">

            <button class="active">
                Dashboard
            </button>

            <button onclick="scrollToSection('ordersSection')">
                Project Orders
            </button>

            <button onclick="scrollToSection('appointmentsSection')">
                Appointments
            </button>

        </div>

    </div>

    <div class="main">

        <div class="topbar">

            <h1>Admin Dashboard</h1>

            <button class="logout-btn" onclick="logout()">
                Logout
            </button>

        </div>

        <!-- STATS -->

        <div class="stats">

            <div class="stat-card">
                <p>Total Orders</p>
                <h2 id="ordersCount">0</h2>
            </div>

            <div class="stat-card">
                <p>Total Appointments</p>
                <h2 id="appointmentsCount">0</h2>
            </div>

        </div>

        <!-- ORDERS -->

        <div class="section" id="ordersSection">

            <h2 class="section-title">
                Project Orders
            </h2>

            <div class="table-wrapper">

                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Service</th>
                            <th>Package</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Company</th>
                        </tr>
                    </thead>

                    <tbody id="ordersTable"></tbody>

                </table>

            </div>

        </div>

        <!-- APPOINTMENTS -->

        <div class="section" id="appointmentsSection">

            <h2 class="section-title">
                Appointments
            </h2>

            <div class="table-wrapper">

                <table>

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Email</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Reply</th>
                        </tr>
                    </thead>

                    <tbody id="appointmentsTable"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */

const supabaseUrl =
"https://jyzuviakszltxerxuyea.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5enV2aWFrc3psdHhlcnh1eWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODEyMTgsImV4cCI6MjA5NDc1NzIxOH0.Vj5tiASTMyrjAwfZQCUWy8_n3AIlDslC4L1rNd5GJ3k";

const client =
window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

/* LOGIN */

async function login(){

    const button =
    document.getElementById("loginBtn");

    button.innerText = "Logging in...";
    button.classList.add("loading");

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value.trim();

    if(!email || !password){

        document.getElementById("error").innerText =
        "Please fill all fields.";

        button.innerText = "Login";
        button.classList.remove("loading");

        return;
    }

    const { error } =
    await client.auth.signInWithPassword({
        email,
        password
    });

    if(error){

        document.getElementById("error").innerText =
        error.message;

        button.innerText = "Login";
        button.classList.remove("loading");

        return;
    }

    showDashboard();

    loadData();

    button.innerText = "Login";
    button.classList.remove("loading");
}

/* LOGOUT */

async function logout(){

    await client.auth.signOut();

    location.reload();
}

/* SHOW DASHBOARD */

function showDashboard(){

    document.getElementById("loginScreen")
    .style.display = "none";

    document.getElementById("dashboard")
    .style.display = "block";
}

/* AUTO SESSION */

window.onload = async ()=>{

    const {
        data:{user}
    } = await client.auth.getUser();

    if(user){

        showDashboard();

        loadData();
    }
};

/* LOAD DATA */

async function loadData(){

    /* ORDERS */

    const {
        data:orders
    } = await client
    .from("orders")
    .select("*")
    .order("id",{ascending:false});

    document.getElementById("ordersCount")
    .innerText = orders?.length || 0;

    document.getElementById("ordersTable")
    .innerHTML = orders?.length
    ?
    orders.map(o=>`

        <tr>
            <td>${o.name || ""}</td>
            <td>${o.service || ""}</td>
            <td>${o.package || ""}</td>
            <td>${o.email || ""}</td>
            <td>${o.phone || ""}</td>
            <td>${o.company || ""}</td>
        </tr>

    `).join("")
    :
    `<tr><td colspan="6" class="empty">No orders yet</td></tr>`;

    /* APPOINTMENTS */

    const {
        data:appointments
    } = await client
    .from("appointments")
    .select("*")
    .order("id",{ascending:false});

    document.getElementById("appointmentsCount")
    .innerText = appointments?.length || 0;

    document.getElementById("appointmentsTable")
    .innerHTML = appointments?.length
    ?
    appointments.map(a=>`

        <tr>

            <td>${a.name || ""}</td>

            <td>${a.company || ""}</td>

            <td>${a.email || ""}</td>

            <td>${a.meeting_date || ""}</td>

            <td>${a.meeting_time || ""}</td>

            <td>

                <a 
                class="reply-btn"
                href="mailto:${a.email}?subject=Elivon Appointment Response">

                    Reply

                </a>

            </td>

        </tr>

    `).join("")
    :
    `<tr><td colspan="6" class="empty">No appointments yet</td></tr>`;
}

/* REALTIME REFRESH */

setInterval(loadData, 5000);

/* SCROLL */

function scrollToSection(id){

    document.getElementById(id)
    .scrollIntoView({
        behavior:"smooth"
    });
}

</script>

</body>
</html>
