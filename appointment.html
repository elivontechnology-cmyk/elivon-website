<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Appointment | Elivon Technology</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

    <img src="images/logo.png" alt="Logo" class="logo">

    <div class="menu-toggle" id="menu-toggle">☰</div>

    <nav id="nav">
        <a href="index.html">Home</a>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </nav>

</header>

<section class="section">

    <h1 class="title">Book An Appointment</h1>

    <p class="text">
        Schedule a consultation or business meeting with Elivon Technology.
    </p>

    <form id="appointment-form" class="contact-form">

        <input type="text" name="name" placeholder="Your Full Name" required>

        <input type="text" name="company" placeholder="Company Name" required>

        <input type="text" name="position" placeholder="Your Position">

        <input type="email" name="email" placeholder="Your Email" required>

        <input type="text" name="phone" placeholder="Phone Number" required>

        <input type="text" name="location" placeholder="Company Location" required>

        <!-- MEETING TYPE -->
        <select name="meeting_type" required>
            <option value="">Meeting Type</option>
            <option>Physical Meeting</option>
            <option>Online Meeting</option>
            <option>Phone Consultation</option>
        </select>

        <!-- MEETING PLACE -->
        <input type="text" name="meeting_place" placeholder="Preferred Meeting Place">

        <!-- DATE -->
        <input type="date" name="meeting_date" required>

        <!-- TIME -->
        <input type="time" name="meeting_time" required>

        <textarea name="details" placeholder="Tell us about the meeting purpose..." required></textarea>

        <button type="submit">Book Appointment</button>

    </form>

</section>

<!-- FOOTER -->
<footer class="footer">

    <div class="footer-content">

        <img src="images/logo.png" alt="Logo" class="footer-logo">

        <p>© 2026 Elivon Technology. All Rights Reserved.</p>

    </div>

</footer>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jyzuviakszltxerxuyea.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5enV2aWFrc3psdHhlcnh1eWVhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3OTE4MTIxOCwiZXhwIjoyMDk0NzU3MjE4fQ.n0jvuvM9lhAUqwt_5Kj5xOcR34PwQki1AKdww92KKuw";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// FORM SUBMIT → SUPABASE
document.getElementById("appointment-form").addEventListener("submit", async function(e){
    e.preventDefault();

    const { error } = await supabase
        .from("appointments")
        .insert([{
            name: this.name.value,
            company: this.company.value,
            position: this.position.value,
            email: this.email.value,
            phone: this.phone.value,
            location: this.location.value,
            meeting_type: this.meeting_type.value,
            meeting_place: this.meeting_place.value,
            meeting_date: this.meeting_date.value,
            meeting_time: this.meeting_time.value,
            details: this.details.value
        }]);

    if(error){
        alert("Failed to book appointment");
        console.log(error);
    } else {
        alert("Appointment booked successfully!");
        this.reset();
    }
});
</script>

<!-- MOBILE MENU -->
<script>
const toggle = document.getElementById("menu-toggle");
const nav = document.getElementById("nav");

toggle.addEventListener("click", () => {
    nav.classList.toggle("active");
});
</script>

</body>
